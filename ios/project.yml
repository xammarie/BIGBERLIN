name: NoWork

options:
  bundleIdPrefix: org.scherf
  deploymentTarget:
    iOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "77R52ZAG63"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  NoWork:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: NoWork
        excludes:
          - "**/*.example.swift"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: org.scherf.NoWork
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Take photos of worksheets to process them with the AI."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Pick worksheet photos and handwriting samples from your library."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record audio for the voice tutor."
        INFOPLIST_KEY_UIRequiresFullScreen: NO
    dependencies:
      - package: Supabase
        product: Supabase
